version: '3.8'
services:
  project_careca:
    build:  
      context: .
      dockerfile: Dockerfile
    container_name: project_careca
    restart: always
    ports:  
      - "8078:80"
    volumes:
      - .:/var/www/html
    environment:
      - API_ENDPOINT=http://api:8001
    networks:
      - project_careca_network

  api:
    build:
      context: ./python_final
      dockerfile: Dockerfile
    container_name: api
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./python_final:/var/www/html/api
    networks:
      - project_careca_network

  db:
    image: mysql:8.0
    container_name: project_careca_db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 7877
      MYSQL_DATABASE: projeto_final
    volumes:
      - db:/var/lib/mysql
    networks:
      - project_careca_network

networks:
  project_careca_network:
    driver: bridge

volumes:
  db:
    driver: local
      